trigger:
  branches:
    include:
      - main

pool:
  name: SelfHostedPool

stages:

# ---------------- BUILD ONLY ----------------
- stage: Build
  jobs:
    - job: BuildJob
      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '18.x'

        - script: |
            npm install
            npm run build
          displayName: "Build React App"