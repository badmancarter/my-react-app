trigger:
- main

pool:
  name: Default  # your self-hosted agent pool

stages:
- stage: Build
  jobs:
  - job: BuildReactApp
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build React App'