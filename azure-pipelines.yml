trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  jobs:
    - job: BuildJob
      steps:
        - checkout: self

        - task: UseNode@1
          inputs:
            version: '18.x'

        - script: |
            npm install
            npm run build
          displayName: "Build React App"