trigger:
- main

pool:
  name: SelfHostedPool

# ======================
# BUILD STAGE
# ======================
stages:

- stage: Build
  jobs:
  - job: BuildApp
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: "Use Node.js"

    - script: npm install --no-audit --no-fund
      displayName: "Install dependencies"

    - script: npm run build
      displayName: "Build React app"

    # 🔥 FIX: publish build output properly
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'build'
        ArtifactName: 'react-build'
        publishLocation: 'Container'
      displayName: "Publish Build Artifact"


# ======================
# TEST STAGE
# ======================
- stage: Test
  dependsOn: Build
  jobs:
  - job: TestApp
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: "Use Node.js"

    - script: npm install --no-audit --no-fund
      displayName: "Install dependencies"

    - script: npm test -- --watchAll=false --passWithNoTests
      displayName: "Run tests"


# ======================
# DEPLOY STAGE
# ======================
- stage: Deploy
  dependsOn: Test
  jobs:
  - job: DeployApp
    steps:

    # 🔥 FIX: download artifact instead of assuming local build folder
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'react-build'
        downloadPath: '$(Pipeline.Workspace)'
      displayName: "Download Build Artifact"

    # Copy build folder to VM
    - task: CopyFilesOverSSH@0
      inputs:
        sshEndpoint: 'ubuntu-ssh-connection'
        sourceFolder: '$(Pipeline.Workspace)/react-build'
        contents: '**'
        targetFolder: '/tmp/react-build'
      displayName: "Copy build to server"

    # Deploy on server
    - task: SSH@0
      inputs:
        sshEndpoint: 'ubuntu-ssh-connection'
        runOptions: 'commands'
        commands: |
          echo "Starting deployment..."

          sudo rm -rf /var/www/html/*
          sudo cp -r /tmp/react-build/* /var/www/html/

          sudo systemctl restart nginx

          echo "Deployment complete."
      displayName: "Deploy to Nginx"