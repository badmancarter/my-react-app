trigger:
- main

pool:
  name: SelfHostedPool

# ======================
# BUILD STAGE
# ======================
stages:

- stage: Build
  jobs:
  - job: BuildApp
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: "Use Node.js"

    - script: npm install --no-audit --no-fund
      displayName: "Install dependencies"

    - script: npm run build
      displayName: "Build React app"

    # 🔥 FIX: publish build output properly
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'build'
        ArtifactName: 'react-build'
        publishLocation: 'Container'
      displayName: "Publish Build Artifact"


# ======================
# TEST STAGE
# ======================
- stage: Test
  dependsOn: Build
  jobs:
  - job: TestApp
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: "Use Node.js"

    - script: npm install --no-audit --no-fund
      displayName: "Install dependencies"

    - script: npm test -- --watchAll=false --passWithNoTests
      displayName: "Run tests"


# ======================
# DEPLOY STAGE
# ======================
- stage: Deploy
  dependsOn: Test
  jobs:
  - job: DeployApp
    steps:

    # Install sshpass
    - script: |
        sudo apt-get update
        sudo apt-get install -y sshpass
      displayName: "Install sshpass"

    # Download artifact
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'react-build'
        downloadPath: '$(Pipeline.Workspace)'
      displayName: "Download Build Artifact"

    # Copy files using SCP (password-based)
    - script: |
        sshpass -p 'Pass1234!' scp -o StrictHostKeyChecking=no -r $(Pipeline.Workspace)/react-build/* ubuntu@35.173.184.135:/tmp/react-build
      displayName: "Copy files via SCP"

    # Deploy on server
    - script: |
        sshpass -p 'Pass1234!' ssh -o StrictHostKeyChecking=no ubuntu@35.173.184.135 "
          sudo rm -rf /var/www/html/* &&
          sudo cp -r /tmp/react-build/* /var/www/html/ &&
          sudo systemctl restart nginx
        "
      displayName: "Deploy via SSH"